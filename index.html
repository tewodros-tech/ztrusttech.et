<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>ZTrust Tech | Complete IT Solutions Provider - Home</title>

  <link rel="icon" type="image/png" href="ICON Final 1 (1).png" />
  <link rel="shortcut icon" href="ICON Final 1 (1).png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #020617;
      --bg2: #050816;
      --panel: rgba(15, 23, 42, 0.72);
      --panel2: rgba(2, 6, 23, 0.82);
      --line: rgba(96, 165, 250, 0.24);
      --text: #eef2ff;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --blue2: #60a5fa;
      --cyan: #22d3ee;
      --green: #22c55e;
      --purple: #8b5cf6;
      --wa: #25D366;
      --tg: #0088cc;
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.52);
      --radius: 32px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    ::selection {
      background: rgba(59,130,246,0.45);
    }

    a {
      color: inherit;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }

    /* ===================== PRELOADER ===================== */

    .preloader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(59,130,246,0.28), transparent 34%),
        radial-gradient(circle at 35% 55%, rgba(34,211,238,0.14), transparent 28%),
        linear-gradient(135deg, #020617, #050816, #01030a);
      transition: opacity 0.65s ease, visibility 0.65s ease;
    }

    .preloader.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loader-box {
      position: relative;
      width: min(440px, 86vw);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(96,165,250,0.35);
      animation: loaderSpin 8s linear infinite;
      box-shadow: 0 0 35px rgba(59,130,246,0.15);
    }

    .loader-ring.two {
      inset: 38px;
      border-color: rgba(34,211,238,0.32);
      animation-duration: 5.5s;
      animation-direction: reverse;
    }

    .loader-ring.three {
      inset: 76px;
      border-color: rgba(139,92,246,0.30);
      animation-duration: 11s;
    }

    .loader-ring.four {
      inset: 112px;
      border-color: rgba(96,165,250,0.18);
      animation-duration: 14s;
      animation-direction: reverse;
    }

    @keyframes loaderSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loader-logo-wrap {
      position: relative;
      width: 74%;
      height: 74%;
      border-radius: 34px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle, rgba(59,130,246,0.28), rgba(2,6,23,0.86) 62%),
        rgba(15,23,42,0.78);
      border: 1px solid rgba(96,165,250,0.38);
      box-shadow:
        inset 0 0 70px rgba(59,130,246,0.16),
        0 0 110px rgba(59,130,246,0.44);
      animation: loaderPulse 1.8s ease-in-out infinite alternate;
      overflow: hidden;
      padding: 24px;
    }

    @keyframes loaderPulse {
      from { transform: scale(1); }
      to { transform: scale(1.045); }
    }

    .loader-logo-wrap::before {
      content: '';
      position: absolute;
      inset: -70%;
      background: conic-gradient(
        from 180deg,
        transparent,
        rgba(34,211,238,0.28),
        transparent,
        rgba(59,130,246,0.35),
        transparent
      );
      animation: loaderGlowSpin 5s linear infinite;
    }

    @keyframes loaderGlowSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loader-logo-wrap::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 32px;
      background: rgba(2,6,23,0.72);
      z-index: 1;
    }

    .loader-logo {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter:
        drop-shadow(0 0 22px rgba(96,165,250,0.85))
        drop-shadow(0 0 44px rgba(34,211,238,0.38));
    }

    .loader-scan {
      position: absolute;
      z-index: 4;
      width: 82%;
      height: 3px;
      left: 9%;
      background: linear-gradient(90deg, transparent, #22d3ee, transparent);
      box-shadow: 0 0 28px rgba(34,211,238,0.95);
      animation: loaderScan 2.1s ease-in-out infinite;
    }

    @keyframes loaderScan {
      0% { top: 20%; opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { top: 80%; opacity: 0; }
    }

    .loader-text {
      position: absolute;
      bottom: -66px;
      width: 100%;
      text-align: center;
      color: #bfdbfe;
      font-weight: 900;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .loader-text span {
      color: var(--cyan);
    }

    /* ===================== BACKGROUND ===================== */

    .cyber-bg {
      position: fixed;
      inset: 0;
      z-index: -9;
      background:
        radial-gradient(circle at 15% 20%, rgba(59,130,246,0.22), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(34,211,238,0.14), transparent 26%),
        radial-gradient(circle at 65% 88%, rgba(139,92,246,0.18), transparent 34%),
        linear-gradient(135deg, #020617 0%, #050816 48%, #02040a 100%);
    }

    .cyber-grid {
      position: fixed;
      inset: 0;
      z-index: -8;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(96,165,250,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,165,250,0.055) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 86%);
      animation: gridMove 18s linear infinite;
    }

    @keyframes gridMove {
      from { transform: translateY(0); }
      to { transform: translateY(44px); }
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: -7;
      pointer-events: none;
      opacity: 0.12;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 4px
      );
    }

    #networkCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -6;
      pointer-events: none;
      opacity: 0.60;
    }

    .moving-bg {
      position: fixed;
      inset: 0;
      z-index: -5;
      overflow: hidden;
      pointer-events: none;
    }

    .moving-element {
      position: absolute;
      font-family: monospace;
      font-weight: 900;
      color: rgba(96,165,250,0.11);
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(59,130,246,0.5);
      animation: floatMove linear infinite;
    }

    @keyframes floatMove {
      0% {
        transform: translateX(-20vw) translateY(0) rotate(0deg);
        opacity: 0;
      }
      12% { opacity: 1; }
      88% { opacity: 1; }
      100% {
        transform: translateX(120vw) translateY(var(--y-offset, 0)) rotate(8deg);
        opacity: 0;
      }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(34px);
      opacity: 0.42;
      z-index: -4;
      animation: orbFloat 9s ease-in-out infinite alternate;
    }

    .orb.one {
      width: 310px;
      height: 310px;
      background: rgba(59,130,246,0.34);
      top: 170px;
      left: -120px;
    }

    .orb.two {
      width: 280px;
      height: 280px;
      background: rgba(34,211,238,0.26);
      top: 520px;
      right: -130px;
      animation-delay: 1.5s;
    }

    .orb.three {
      width: 240px;
      height: 240px;
      background: rgba(139,92,246,0.24);
      bottom: -90px;
      left: 42%;
      animation-delay: 2.3s;
    }

    @keyframes orbFloat {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(35px, -42px, 0) scale(1.12); }
    }

    /* ===================== NAVBAR ===================== */

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(2,6,23,0.78);
      border-bottom: 1px solid rgba(96,165,250,0.24);
      backdrop-filter: blur(22px);
      box-shadow: 0 10px 45px rgba(0,0,0,0.32);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
    }

    .nav-logo {
      height: 56px;
      width: auto;
      object-fit: contain;
      border-radius: 14px;
      filter: drop-shadow(0 0 15px rgba(59,130,246,0.50));
      transition: 0.25s;
    }

    .nav-logo:hover {
      transform: scale(1.04);
    }

    .logo-text {
      color: #fff;
      font-weight: 900;
      font-size: 1.35rem;
      letter-spacing: -0.035em;
    }

    .logo-text span {
      color: var(--blue2);
    }

    .links {
      display: flex;
      align-items: center;
      gap: 1.7rem;
    }

    .links a {
      position: relative;
      text-decoration: none;
      font-weight: 800;
      color: #cbd5e1;
      transition: 0.25s;
      font-size: 0.92rem;
    }

    .links a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -7px;
      height: 2px;
      width: 0;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border-radius: 999px;
      transition: 0.25s;
    }

    .links a:hover,
    .links a.active {
      color: #fff;
    }

    .links a:hover::after,
    .links a.active::after {
      width: 100%;
    }

    .nav-cta {
      color: #fff !important;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 16px 32px rgba(37,99,235,0.25);
    }

    .nav-cta::after {
      display: none;
    }

    .menu-toggle {
      display: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      background: rgba(59,130,246,0.14);
      border: 1px solid rgba(96,165,250,0.22);
      padding: 8px 12px;
      border-radius: 14px;
    }

    /* ===================== FLOAT BUTTONS ===================== */

    .floating-wa-tg {
      position: fixed;
      bottom: 22px;
      left: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 999;
    }

    .float-wa,
    .float-tg {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.75rem;
      color: white;
      text-decoration: none;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      transition: 0.25s;
    }

    .float-wa:hover,
    .float-tg:hover {
      transform: translateY(-4px) scale(1.04);
    }

    .float-wa { background: var(--wa); }
    .float-tg { background: var(--tg); }

    /* ===================== HERO ===================== */

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 120px 0 80px;
      border-bottom: 1px solid rgba(96,165,250,0.16);
      background: #020617;
    }

    /* Your original net GIF animation */
    .hero-gif {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      opacity: 0.58;
      filter: saturate(1.15) contrast(1.08) brightness(0.95);
    }

    /* Home page background image requested */
    .hero-brand-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 1;
      pointer-events: none;
      opacity: 0.92;
      mix-blend-mode: screen;
      filter:
        saturate(1.18)
        contrast(1.08)
        brightness(0.98)
        drop-shadow(0 0 34px rgba(34,211,238,0.18));
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at 58% 50%, rgba(34,211,238,0.06), transparent 24%),
        radial-gradient(circle at 68% 42%, rgba(59,130,246,0.08), transparent 34%),
        linear-gradient(
          90deg,
          rgba(2,6,23,0.86) 0%,
          rgba(2,6,23,0.66) 29%,
          rgba(2,6,23,0.26) 56%,
          rgba(2,6,23,0.45) 100%
        );
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      background-image:
        linear-gradient(rgba(96,165,250,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,165,250,0.045) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at 50% 50%, black 18%, transparent 74%);
      pointer-events: none;
    }

    .hero .container {
      position: relative;
      z-index: 3;
    }

    .hero-content {
      min-height: 72vh;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      align-items: center;
      gap: 36px;
    }

    .hero-copy {
      max-width: 620px;
      padding: 32px;
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(2,6,23,0.62), rgba(2,6,23,0.22));
      border: 1px solid rgba(96,165,250,0.18);
      backdrop-filter: blur(14px);
      box-shadow: 0 28px 80px rgba(0,0,0,0.34);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 15px;
      border-radius: 999px;
      background: rgba(15,23,42,0.70);
      border: 1px solid rgba(96,165,250,0.34);
      color: #dbeafe;
      font-weight: 900;
      font-size: 0.84rem;
      margin-bottom: 18px;
      box-shadow: 0 0 35px rgba(59,130,246,0.15);
    }

    .hero-badge i {
      color: var(--cyan);
    }

    .hero-copy h1 {
      font-size: clamp(2.45rem, 5vw, 5rem);
      line-height: 0.98;
      letter-spacing: -0.075em;
      font-weight: 900;
      margin-bottom: 20px;
      color: #fff;
    }

    .hero-copy h1 span {
      background: linear-gradient(135deg, #ffffff 0%, #93c5fd 35%, #22d3ee 75%, #8b5cf6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-copy p {
      color: #cbd5e1;
      line-height: 1.75;
      font-size: 1rem;
      margin-bottom: 26px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      font-family: inherit;
      font-weight: 900;
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      box-shadow: 0 22px 45px rgba(37,99,235,0.30);
    }

    .btn-ghost {
      background: rgba(15,23,42,0.74);
      border: 1px solid rgba(148,163,184,0.22);
      backdrop-filter: blur(14px);
    }

    .btn-wa {
      background: linear-gradient(135deg, #25D366, #128C7E);
      box-shadow: 0 20px 42px rgba(37,211,102,0.22);
    }

    .hero-status-panel {
      justify-self: end;
      width: min(390px, 100%);
      padding: 24px;
      border-radius: 30px;
      background: rgba(15,23,42,0.50);
      border: 1px solid rgba(96,165,250,0.18);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 70px rgba(0,0,0,0.30);
    }

    .terminal-top {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
    }

    .terminal-top span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: block;
    }

    .terminal-top span:nth-child(1) { background: #fb7185; }
    .terminal-top span:nth-child(2) { background: #facc15; }
    .terminal-top span:nth-child(3) { background: #22c55e; }

    .terminal-line {
      font-family: monospace;
      color: #93c5fd;
      font-size: 0.8rem;
      line-height: 1.75;
      margin-bottom: 14px;
    }

    .terminal-line strong {
      color: #67e8f9;
    }

    .status-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .status-item {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(2,6,23,0.52);
      border: 1px solid rgba(148,163,184,0.12);
    }

    .status-item i {
      color: #22d3ee;
    }

    .status-item strong {
      font-size: 0.86rem;
    }

    .status-item small {
      color: #bbf7d0;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.22);
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 900;
    }

    /* ===================== SECTIONS ===================== */

    .section {
      padding: 90px 0;
      position: relative;
    }

    .section-heading {
      text-align: center;
      margin-bottom: 44px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
